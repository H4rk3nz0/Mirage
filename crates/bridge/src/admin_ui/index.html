<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mirage Bridge — Admin</title>
<style>
  :root{
    --bg:#0b0f14; --card:#131a22; --card2:#0f151c; --line:#1e2833;
    --accent:#10b981; --accent-d:#0d9268; --text:#e5edf5; --muted:#7d8896;
    --danger:#ef4444; --warn:#eab308; --input:#0f151c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  a{color:var(--accent)}
  .wrap{max-width:960px;margin:0 auto;padding:20px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  header h1{font-size:20px;font-weight:800;margin:0}
  header .sub{color:var(--muted);font-size:12px}
  .dot{width:11px;height:11px;border-radius:50%;background:#3a4653;flex:0 0 auto}
  .dot.up{background:var(--accent)} .dot.down{background:var(--danger)}
  .grow{flex:1}
  button{font:inherit;border:0;border-radius:8px;padding:9px 14px;cursor:pointer;
    background:#26313d;color:var(--text)}
  button.primary{background:var(--accent);color:#04120c;font-weight:700}
  button.primary:hover{background:var(--accent-d)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .card{background:var(--card);border-radius:12px;padding:14px}
  .card .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .card .v{font-size:24px;font-weight:700;margin-top:4px}
  .card .v.small{font-size:15px;font-weight:600}
  .panel{background:var(--card);border-radius:12px;padding:18px;margin-top:16px}
  .panel h2{font-size:14px;margin:0 0 12px}
  .bars{display:flex;flex-direction:column;gap:6px}
  .bar{display:flex;align-items:center;gap:8px;font-size:12px}
  .bar .lbl{width:90px;color:var(--muted)} .bar .track{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
  .bar .fill{height:100%;background:var(--accent)} .bar .n{width:52px;text-align:right}
  .section{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
  .section>summary{padding:11px 14px;cursor:pointer;font-weight:600;background:var(--card2);
    list-style:none;display:flex;align-items:center;gap:8px}
  .section>summary::-webkit-details-marker{display:none}
  .section .fields{padding:8px 14px 14px}
  .field{display:grid;grid-template-columns:220px 1fr;gap:10px;align-items:center;padding:7px 0;
    border-top:1px solid var(--line)}
  .field:first-child{border-top:0}
  .field label{color:var(--text);font-size:13px}
  .field label .key{color:var(--muted);font-size:11px;display:block;font-family:ui-monospace,monospace}
  .field .help{color:var(--muted);font-size:11px;grid-column:1/-1;margin-top:-4px}
  .field.danger label{color:var(--warn)}
  input[type=text],input[type=number],textarea,select{width:100%;background:var(--input);
    border:1px solid var(--line);border-radius:7px;color:var(--text);padding:8px;font:inherit}
  textarea{font-family:ui-monospace,monospace;font-size:12px;min-height:80px;resize:vertical}
  input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
  .row{display:flex;gap:8px;align-items:center}
  .secret{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:12px}
  .pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:#0f151c;color:var(--muted)}
  .pill.on{color:var(--accent)} .pill.off{color:var(--muted)}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#1a232e;border:1px solid var(--line);border-radius:9px;padding:11px 16px;
    opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%}
  #toast.show{opacity:1}
  #toast.err{border-color:#7f1d1d;color:#fca5a5}
  #toast.ok{border-color:var(--accent-d);color:var(--accent)}
  #gate{max-width:420px;margin:80px auto;text-align:center}
  #gate input{margin:14px 0;text-align:center}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:20px}
  .rawwrap summary{color:var(--muted)}
</style>
</head>
<body>
<div id="gate" style="display:none">
  <h1>Mirage Bridge Admin</h1>
  <p class="sub" style="color:var(--muted)">Paste the access token printed on the bridge console.</p>
  <input id="gate-token" type="text" placeholder="token" autocomplete="off">
  <button class="primary" onclick="saveToken()">Unlock</button>
</div>

<div class="wrap" id="app" style="display:none">
  <header>
    <span class="dot" id="dot"></span>
    <div>
      <h1>Mirage Bridge</h1>
      <div class="sub" id="subtitle">connecting…</div>
    </div>
    <span class="grow"></span>
    <button class="ghost" onclick="refresh()">Refresh</button>
    <button class="primary" id="restartBtn" onclick="restart()">Restart bridge</button>
  </header>

  <div class="cards" id="stats"></div>

  <div class="panel">
    <h2>Sessions by transport</h2>
    <div class="bars" id="transports"><div class="sub" style="color:var(--muted)">no sessions yet</div></div>
  </div>

  <div class="panel">
    <div class="row"><h2 style="margin:0">Configuration</h2><span class="grow"></span>
      <span class="sub" id="cfgpath" style="color:var(--muted);font-size:11px"></span></div>
    <div id="form"></div>
    <details class="section rawwrap" style="margin-top:12px">
      <summary>Advanced — raw JSON (secrets masked)</summary>
      <div class="fields"><textarea id="raw" style="min-height:220px"></textarea>
        <div class="help" style="color:var(--muted)">Edits here override the form on Save. Masked secrets are preserved.</div></div>
    </details>
    <div class="row" style="margin-top:14px">
      <button class="primary" onclick="save()">Save config</button>
      <span class="sub" style="color:var(--muted);font-size:12px">Changes apply after a restart.</span>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<div id="toast"></div>

<script>
"use strict";
const SECRET_MASK = "__MIRAGE_SECRET_UNCHANGED__";
let TOKEN = null;
let MODEL = {};        // current config object (secrets masked)
let TYPES = {};        // key -> original JS type for coercion
let SECRETS = {};      // key -> present:bool

// ---- known-key metadata (label/help/section/danger). Unknown keys still render. ----
const META = {
  bind:{s:"Network",h:"Public address clients dial (host:port)."},
  upstream_allowlist:{s:"Network",h:"Allowed egress destinations (empty = all public)."},
  allow_private_network_targets:{s:"Network",d:1,h:"DANGER: lets clients reach RFC1918/internal nets (SSRF)."},
  allow_loopback_targets:{s:"Network",d:1,h:"DANGER: lets clients reach the bridge's own loopback."},
  reality_enabled:{s:"Reality",h:"Enable the Reality TLS-mimicry carrier."},
  reality_cover_addr:{s:"Reality",h:"Real HTTPS site the bridge fronts."},
  reality_cover_addrs:{s:"Reality",h:"Real HTTPS site(s) the bridge fronts."},
  reality_tls_mode:{s:"Reality",h:"ephemeral | pinned | borrow (cover-cert parity)."},
  reality_probe_accept_legacy:{s:"Reality",d:1,h:"Accept pre-epoch-MAC probes (keep off unless mid-migration)."},
  hysteria2_enabled:{s:"Hysteria2 / QUIC",h:"Enable the Hysteria2 QUIC carrier."},
  hysteria2_bind:{s:"Hysteria2 / QUIC",h:"UDP listener (defaults to the bind host:port)."},
  hysteria2_send_rate_mbps:{s:"Hysteria2 / QUIC",h:"Paced send rate (Mbps)."},
  hysteria2_brutal:{s:"Hysteria2 / QUIC",d:1,h:"BRUTAL loss-immune CC — hostile links only (constant rate is a tell)."},
  hysteria2_hostname:{s:"Hysteria2 / QUIC",h:"TLS front (SNI) — a real HTTP/3 origin you serve."},
  hysteria2_cert_der_path:{s:"Hysteria2 / QUIC",h:"Real leaf cert (DER) — set with the key path."},
  hysteria2_key_der_path:{s:"Hysteria2 / QUIC",h:"PKCS#8 key (DER) — set with the cert path."},
  derived_port_base:{s:"Port-hopping",h:"Lower bound (>=1024) of the per-epoch port range."},
  derived_port_range:{s:"Port-hopping",h:"Range width (100–8192)."},
  shadow_target:{s:"Shadow / cover",h:"Where unauthenticated/probe traffic is forwarded."},
  http_shadow_target:{s:"Shadow / cover",h:"HTTP-probe cover destination."},
  pad_enabled:{s:"Padding / mux",h:"Length padding — the client must match this."},
  stream_mux_enabled:{s:"Padding / mux",h:"Stream multiplexing — the client must match this."},
  metrics_bind:{s:"Observability",h:"Prometheus /metrics bind (loopback)."},
  admin_bind:{s:"Observability",h:"This admin UI's bind (loopback only)."},
  admin_service:{s:"Observability",h:"systemd unit the Restart button targets."},
};
const PREFIX_SECTION = [
  ["reality_","Reality"],["hysteria2_","Hysteria2 / QUIC"],["h3_","Hysteria2 / QUIC"],
  ["quic_obfs_","Hysteria2 / QUIC"],["obfs_","obfs / WebSocket"],["ws_","obfs / WebSocket"],
  ["dnstt_","DNS tunnel"],["vless_","VLESS"],["derived_port_","Port-hopping"],
  ["cohort_","Cohort / discovery"],["refresh_","Cohort / discovery"],["claim_","Cohort / discovery"],
  ["gossip_","Cohort / discovery"],["circuit_","Relay / multi-hop"],["relay_","Relay / multi-hop"],
  ["bridge_","Identity / keys"],["operator_","Identity / keys"],["ss2022_","Identity / keys"],
  ["rate_limit","Network"],["log_","Observability"],["replay_","Observability"],["claim_log","Observability"],
];
const SECTION_ORDER = ["Network","Reality","Hysteria2 / QUIC","obfs / WebSocket","DNS tunnel","VLESS",
  "Port-hopping","Shadow / cover","Padding / mux","Cohort / discovery","Relay / multi-hop",
  "Observability","Identity / keys","Other"];

function sectionFor(key){
  if(META[key]&&META[key].s) return META[key].s;
  for(const [p,s] of PREFIX_SECTION) if(key.startsWith(p)) return s;
  return "Other";
}
function prettify(k){return k.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());}

// ---- token gate ----
function readHashToken(){
  const m=(location.hash||"").match(/t=([a-f0-9]+)/i);
  return m?m[1]:null;
}
function saveToken(){
  const t=document.getElementById("gate-token").value.trim();
  if(t){sessionStorage.setItem("mirage_admin_token",t);TOKEN=t;boot();}
}
function api(path,opts){
  opts=opts||{};
  opts.headers=Object.assign({"Authorization":"Bearer "+TOKEN},opts.headers||{});
  return fetch(path,opts);
}

// ---- toast ----
let toastT;
function toast(msg,kind){
  const el=document.getElementById("toast");
  el.textContent=msg;el.className="show "+(kind||"");
  clearTimeout(toastT);toastT=setTimeout(()=>el.className="",3200);
}

// ---- dashboard ----
async function refresh(){
  try{
    const r=await api("/api/status");
    if(r.status===401){gate();return;}
    const s=await r.json();
    renderStats(s);
    document.getElementById("dot").className="dot up";
    document.getElementById("subtitle").textContent=
      s.transport+" · tls:"+s.tls_mode+" · up "+fmtDur(s.uptime_secs);
    document.getElementById("foot").textContent="mirage-bridge "+s.version;
  }catch(e){
    document.getElementById("dot").className="dot down";
    document.getElementById("subtitle").textContent="bridge unreachable — "+(e.message||e);
  }
}
function card(k,v,small){return `<div class="card"><div class="k">${k}</div><div class="v${small?' small':''}">${v}</div></div>`;}
function renderStats(s){
  const se=s.sessions||{},re=s.reality||{};
  document.getElementById("stats").innerHTML=[
    card("Active sessions",se.active??0),
    card("Accepted",se.accepted??0),
    card("Reality auth",re.authenticated??0),
    card("Cover served",re.cover_served??0),
    card("Rate-limit drops",s.rate_limit_drops??0),
    card("Replay set",s.replay_set_size??0),
    card("Handshake fail",(se.handshake_failed??0)+(se.handshake_timeout??0)),
    card("Uptime",fmtDur(s.uptime_secs),true),
  ].join("");
  const bt=s.sessions_by_transport||{};
  const keys=Object.keys(bt);
  const max=Math.max(1,...keys.map(k=>bt[k]));
  const el=document.getElementById("transports");
  el.innerHTML=keys.length?keys.map(k=>
    `<div class="bar"><span class="lbl">${k}</span>
     <span class="track"><span class="fill" style="width:${Math.round(bt[k]/max*100)}%"></span></span>
     <span class="n">${bt[k]}</span></div>`).join("")
    :`<div class="sub" style="color:var(--muted)">no sessions yet</div>`;
}
function fmtDur(s){s=s||0;const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);
  if(d)return d+"d "+h+"h";if(h)return h+"h "+m+"m";if(m)return m+"m";return s+"s";}

// ---- config editor ----
async function loadConfig(){
  const r=await api("/api/config");
  if(r.status===401){gate();return;}
  const data=await r.json();
  MODEL=data.config||{};SECRETS=data.secrets||{};
  TYPES={};for(const k in MODEL)TYPES[k]=Array.isArray(MODEL[k])?"array":typeof MODEL[k];
  document.getElementById("cfgpath").textContent=data.path||"";
  renderForm();
  syncRaw();
}
function renderForm(){
  const bySection={};
  for(const key of Object.keys(MODEL).sort()){
    const sec=sectionFor(key);(bySection[sec]=bySection[sec]||[]).push(key);
  }
  const parts=[];
  for(const sec of SECTION_ORDER){
    const keys=bySection[sec];if(!keys)continue;
    parts.push(`<details class="section" ${sec==="Network"||sec==="Reality"?"open":""}>
      <summary>${sec} <span class="sub" style="color:var(--muted);font-weight:400">(${keys.length})</span></summary>
      <div class="fields">${keys.map(fieldHtml).join("")}</div></details>`);
  }
  // any leftover sections not in SECTION_ORDER
  for(const sec in bySection){if(SECTION_ORDER.includes(sec))continue;
    parts.push(`<details class="section"><summary>${sec}</summary>
      <div class="fields">${bySection[sec].map(fieldHtml).join("")}</div></details>`);}
  document.getElementById("form").innerHTML=parts.join("");
}
function fieldHtml(key){
  const m=META[key]||{};const val=MODEL[key];const t=TYPES[key];
  const lbl=`<label>${prettify(key)}<span class="key">${key}</span></label>`;
  let input;
  if(val===SECRET_MASK||SECRETS[key]!==undefined){
    input=`<div class="secret"><span class="pill ${SECRETS[key]?'on':'off'}">${SECRETS[key]?'set':'unset'}</span>
      <input type="text" data-key="${key}" data-secret="1" placeholder="unchanged — type to replace" value="">
      </div>`;
  }else if(t==="boolean"){
    input=`<div class="row"><input type="checkbox" data-key="${key}" ${val?"checked":""}></div>`;
  }else if(t==="number"){
    input=`<input type="number" data-key="${key}" value="${val??""}">`;
  }else if(t==="array"||t==="object"){
    input=`<textarea data-key="${key}" data-json="1">${escapeHtml(JSON.stringify(val,null,2))}</textarea>`;
  }else{
    input=`<input type="text" data-key="${key}" value="${escapeHtml(val==null?"":String(val))}">`;
  }
  const help=m.h?`<div class="help">${m.h}</div>`:"";
  return `<div class="field ${m.d?"danger":""}">${lbl}${input}${help}</div>`;
}
function escapeHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// pull the DOM inputs back into MODEL, coercing to original types
function collectForm(){
  document.querySelectorAll("[data-key]").forEach(el=>{
    const key=el.getAttribute("data-key");
    if(el.getAttribute("data-secret")){
      const v=el.value.trim();
      if(v==="")return;                 // unchanged -> leave mask/omit
      MODEL[key]=v;                      // operator typed a new secret
    }else if(el.type==="checkbox"){
      MODEL[key]=el.checked;
    }else if(el.getAttribute("data-json")){
      try{MODEL[key]=JSON.parse(el.value);}catch(e){throw new Error(key+": invalid JSON");}
    }else if(el.type==="number"){
      MODEL[key]=el.value===""?null:Number(el.value);
    }else{
      MODEL[key]=el.value;
    }
  });
}
function syncRaw(){document.getElementById("raw").value=JSON.stringify(MODEL,null,2);}

document.addEventListener("input",e=>{
  // keep raw JSON in sync when a form field changes (and vice-versa on blur)
  if(e.target.closest&&e.target.closest("#form")){try{collectForm();syncRaw();}catch(_){}}
});
document.addEventListener("change",e=>{
  if(e.target.id==="raw"){try{MODEL=JSON.parse(e.target.value);renderForm();}
    catch(err){toast("raw JSON invalid: "+err.message,"err");}}
});

async function save(){
  try{
    // Prefer the raw editor if it was touched to something valid; else the form.
    const raw=document.getElementById("raw").value;
    try{MODEL=JSON.parse(raw);}catch(_){collectForm();}
    const r=await api("/api/config",{method:"POST",
      headers:{"Content-Type":"application/json"},body:JSON.stringify(MODEL)});
    const res=await r.json().catch(()=>({}));
    if(r.ok){toast("Config saved — restart to apply.","ok");loadConfig();}
    else toast(res.error||("save failed ("+r.status+")"),"err");
  }catch(e){toast(e.message||String(e),"err");}
}

async function restart(){
  if(!confirm("Restart the bridge? All live sessions will drop."))return;
  const btn=document.getElementById("restartBtn");btn.disabled=true;btn.textContent="Restarting…";
  try{
    const r=await api("/api/restart",{method:"POST"});
    const res=await r.json().catch(()=>({}));
    toast(res.message||"restart requested",res.ok?"ok":"err");
    if(res.ok){
      // Poll until the freshly-started process answers again.
      document.getElementById("dot").className="dot down";
      let tries=0;const iv=setInterval(async()=>{
        tries++;
        try{const s=await api("/api/status");if(s.ok){clearInterval(iv);btn.disabled=false;
          btn.textContent="Restart bridge";toast("bridge back up","ok");refresh();loadConfig();}}
        catch(_){}
        if(tries>30){clearInterval(iv);btn.disabled=false;btn.textContent="Restart bridge";}
      },1000);
    }else{btn.disabled=false;btn.textContent="Restart bridge";}
  }catch(e){toast("restart failed: "+(e.message||e),"err");btn.disabled=false;btn.textContent="Restart bridge";}
}

// ---- boot ----
function gate(){document.getElementById("app").style.display="none";
  document.getElementById("gate").style.display="block";}
async function boot(){
  document.getElementById("gate").style.display="none";
  document.getElementById("app").style.display="block";
  await refresh();await loadConfig();
  setInterval(refresh,3000);
}
(function(){
  const t=readHashToken()||sessionStorage.getItem("mirage_admin_token");
  if(t){sessionStorage.setItem("mirage_admin_token",t);TOKEN=t;
    if(location.hash)history.replaceState(null,"",location.pathname);  // scrub token from URL bar
    boot();}
  else gate();
})();
</script>
</body>
</html>
