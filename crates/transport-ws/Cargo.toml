# sha1 = "0.10" - required by the WebSocket RFC (Sec-WebSocket-Accept);
# the only use of SHA-1 in this crate. Not used for any security-sensitive
# operation; SHA-1 is mandated by RFC 6455 §4.2.2 for the accept-key HMAC.
sha1 = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }

