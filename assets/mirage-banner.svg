<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" width="820" height="280" fill="none" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="Mirage - a censorship-resistance framework">
  <title>Mirage</title>
  <defs>
    <linearGradient id="r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62b0f2"/><stop offset="1" stop-color="#9385f2"/>
    </linearGradient>
    <linearGradient id="e" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9385f2" stop-opacity=".6"/><stop offset="1" stop-color="#9385f2" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#4f9fe6" stop-opacity=".22"/>
      <stop offset="55%" stop-color="#9385f2" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#9385f2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="820" height="280" rx="24" fill="#0b1220"/>
  <rect x="80" y="-140" width="660" height="360" fill="url(#glow)"/>

  <!-- mark, 84px, centred -->
  <g transform="translate(368,42) scale(1.75)">
    <path d="M24 9 L40 31 H8 Z" fill="url(#r)"/>
    <rect x="7" y="30.4" width="34" height="2" rx="1" fill="#4f9fe6" opacity=".55"/>
    <path d="M24 45 L37 34 H11 Z" fill="url(#e)"/>
  </g>

  <text x="410" y="196" text-anchor="middle" fill="#e9eff8" font-size="46" font-weight="600" letter-spacing="14">MIRAGE</text>
  <text x="410" y="236" text-anchor="middle" font-size="16" letter-spacing=".3">
    <tspan fill="#8494ab">Don't be invisible.&#160;&#160;</tspan><tspan fill="#62b0f2">Be uninteresting.</tspan>
  </text>
