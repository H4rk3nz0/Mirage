<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none" role="img" aria-label="Mirage">
  <title>Mirage</title>
  <defs>
    <linearGradient id="r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62b0f2"/><stop offset="1" stop-color="#9385f2"/>
    </linearGradient>
    <linearGradient id="e" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9385f2" stop-opacity=".55"/><stop offset="1" stop-color="#9385f2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- the peak on the horizon -->
  <path d="M24 9 L40 31 H8 Z" fill="url(#r)"/>
  <!-- the horizon -->
  <rect x="7" y="30.4" width="34" height="2" rx="1" fill="#4f9fe6" opacity=".55"/>
  <!-- its refracted mirage -->
  <path d="M24 45 L37 34 H11 Z" fill="url(#e)"/>
</svg>
